version: "3.9"

# ═══════════════════════════════════════════════════════════════════════════════
# AgentGRIT 2.0 - Docker Compose Production Configuration
# ═══════════════════════════════════════════════════════════════════════════════

services:
  # ─────────────────────────────────────────────────────────────────────────────
  # Redis Cache
  # ─────────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agentgrit-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agentgrit-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  # ─────────────────────────────────────────────────────────────────────────────
  # Ollama (Local LLM - Optional Fallback)
  # ─────────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agentgrit-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - agentgrit-net
    profiles:
      - with-ollama  # Only start with: docker compose --profile with-ollama up
    deploy:
      resources:
        limits:
          memory: 8G  # Adjust based on model size
        reservations:
          memory: 4G

  # ─────────────────────────────────────────────────────────────────────────────
  # AgentGRIT Core Application
  # ─────────────────────────────────────────────────────────────────────────────
  agentgrit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentgrit-core
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
    environment:
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agentgrit-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ─────────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy (Optional - for SSL/production)
  # ─────────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: agentgrit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - agentgrit
    networks:
      - agentgrit-net
    profiles:
      - with-nginx

# ═══════════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════════

volumes:
  redis_data:
    driver: local
  ollama_models:
    driver: local

# ═══════════════════════════════════════════════════════════════════════════════
# Networks
# ═══════════════════════════════════════════════════════════════════════════════

networks:
  agentgrit-net:
    driver: bridge
